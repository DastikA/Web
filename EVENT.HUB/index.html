<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVENT.HUB | Dinazavr Cods</title>
    <link rel="stylesheet" href="style.css">
    <button class="action-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
</head>
<body>
    <div class="background-blobs">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">EVENT<span>.HUB</span></div>
            <button class="add-btn" onclick="toggleModal()">+ Создать ивент</button> <button class="action-btn" onclick="showProfile()" style="font-size: 20px;">👤 Профиль</button>
        </header>

<div class="filters">
    <div class="filter-group">
        <label>Категория</label>
        <div class="custom-select-wrapper" id="catSelect">
            <div class="custom-input" id="catCurrent">Все категории</div>
            <div class="custom-options" id="catOptions">
                <div class="option" data-value="all">Все категории</div>
                <div class="option" data-value="Cyber">Киберспорт</div>
                <div class="option" data-value="Music">Музыка</div>
                <div class="option" data-value="Meetup">Встречи</div>
            </div>
        </div>
    </div>

    <div class="filter-group">
        <label>Город</label>
        <input type="text" class="custom-input" id="filterCity" placeholder="Поиск города..." oninput="applyFilters()">
    </div>

    <div class="filter-group">
        <label>Дата</label>
        <input type="date" class="custom-input" id="filterDate" onchange="applyFilters()">
    </div>
</div>

<!-- Модалка для Страницы События (Детали) -->
<div id="eventDetailModal" class="modal hidden">
    <div class="glass-card detail-content">
        <div id="eventDetailData"></div>
        <button class="cancel-btn" onclick="closeDetails()" style="width: 100%; margin-top: 20px;">Назад к списку</button>
    </div>
</div>

        <div id="eventGrid" class="grid">
            <!-- Карточки появятся здесь из JS -->
        </div>
    </div>

    <section id="profileSection" class="hidden">
        <div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center;">
    <button class="action-btn" onclick="updateProfileUI()">📅 Я иду</button>
    <button class="action-btn" onclick="showFavorites()">⭐ Избранное</button>
</div>
    <div class="glass-card profile-header">
        <h2>Мой профиль</h2>
        <p id="userStats">Вы идете на 0 мероприятий</p>
        <button class="cancel-btn" onclick="showHome()">← На главную</button>
    </div>
    
    <h3 style="margin-top: 30px;">Я пойду:</h3>
    <div id="joinedEventsGrid" class="grid">
        <!-- Сюда попадут выбранные ивенты -->
    </div>
</section>

    <!-- Модальное окно -->
    <div id="modal" class="modal hidden">
        <div class="glass-card modal-content">
            <h2>Новое событие</h2>
            <input type="text" id="eventCity" placeholder="Город (например, Ташкент)">
            <input type="text" id="eventImg" placeholder="Ссылка на фото (URL)">
            <textarea id="eventDesc" placeholder="Описание события..." class="glass-input" style="width: 100%; height: 80px;"></textarea>

            <input type="text" id="eventTitle" placeholder="Название (напр. SimRacing Cup)">
            <input type="date" id="eventDate">
            <select id="eventCategory">
                <option value="Cyber">Киберспорт</option>
                <option value="Music">Концерт</option>
                <option value="Sport">Спорт</option>
                <option value="Meetup">Встреча</option>
            </select>
            <div class="modal-actions">
                <button class="save-btn" onclick="saveEvent()">Опубликовать</button>
                <button class="cancel-btn" onclick="toggleModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
